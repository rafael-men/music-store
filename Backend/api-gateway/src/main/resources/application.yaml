spring:
  application:
    name: api-gateway
jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:music-store}
  audience: ${JWT_AUDIENCE:music-store-api}

internal:
  secret: dev-internal-secret-change-me

server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
